<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Important for mobile scaling -->
  <style>
    body {
      background: #fff;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    h1 {
      font-size: 8vw; /* scales with screen width */
      margin-top: 5vh;
      background: linear-gradient(90deg, #ff6f61, #ffcc70, #6a5acd, #00c9ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 2px 2px #aaa;
    }
    .message {
      font-size: 4vw; /* scales with screen width */
      margin-top: 2vh;
      color: #444;
      font-weight: bold;
      letter-spacing: 1px;
    }
    img {
      margin-top: 3vh;
      max-width: 90%; /* fits smaller screens */
      height: auto;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    button {
      margin-top: 4vh;
      padding: 2vh 4vw;
      font-size: 4vw;
      background-color: #6a5acd;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    button:hover {
      background-color: #483d8b;
    }

    /* Extra tweaks for larger laptop screens */
    @media (min-width: 768px) {
      h1 { font-size: 3em; }
      .message { font-size: 1.5em; }
      button { font-size: 1.2em; padding: 12px 25px; }
    }
  </style>
</head>
<body>
  <h1>🎉 Happy 19th Birthday! 🎂</h1>
  
  <!-- Change the message here -->
  <div class="message">May you have a wonderful day and all of your prayers get accepted wether they are good or bad. Stayy Happy Stayy Blessed Khadija <3 Pookiemon!</div>
  
  <!-- Add your image here -->
  <img src="https://www.freepik.com/free-photos-vectors/happy-birthday" alt="Birthday Celebration">

  <button onclick="playMusic()">Play Birthday Song</button>
  <audio id="song" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

  <script>
    function playMusic() {
      document.getElementById('song').play();
    }
  </script>
</body>
</html>
